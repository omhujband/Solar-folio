<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Solar-folio</title>
    <!--
      GitHub Pages SPA redirect workaround.
      When a user navigates directly to a sub-route (e.g. /Solar-folio/home),
      GitHub Pages returns this 404.html instead of a real 404.
      This script redirects to the app root while preserving the intended path
      in the query string so the app can restore it.
      See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1 // keep the repo name segment
      var l = window.location
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
